import streamlit_authenticator as stauth

# 1. Siapkan data dalam bentuk Dictionary (sesuai kemauan library versi baru)
credentials = {
    'usernames': {
        'admin_candi': {
            'name': 'Admin Candi',
            'password': 'adminpgcandibaru' # Ganti password aslinya
        },
        'staf_spi': {
            'name': 'Staf SPI',
            'password': 'spiadmin123' # Ganti password aslinya
        }
    }
}

# 2. Panggil mesin pengacak
# Di versi ini, dia bakal langsung ngacak password di dalam variabel 'credentials' tadi
stauth.Hasher.hash_passwords(credentials)

# 3. Ambil hasilnya
print("\n--- SALIN KODE HASH DI BAWAH INI ---")
for username, data in credentials['usernames'].items():
    print(f"Username: {username}")
    print(f"Hash: {data['password']}")
    print("-" * 30)
